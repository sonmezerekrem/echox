# Publish to GitHub Packages and npmjs.com when compilation-related files change on main.
# Bump version in package.json before pushing when you want a new release.
#
# Install: npm install -g @sonmezerekrem/echox  (from npm)
# Or from GitHub Packages: set @sonmezerekrem:registry=https://npm.pkg.github.com in ~/.npmrc and npm login there.
#
# Add NPM_TOKEN in repo Secrets for npm publish: https://www.npmjs.com/settings/~yourusername/tokens (Automation/Publish).

name: Publish package

on:
  push:
    branches: [main]
    paths:
      - "bin/**"
      - "src/**"
      - "astro.config.mjs"
      - "package.json"
      - "package-lock.json"
      - ".npmrc"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@sonmezerekrem"

      - name: Install dependencies
        run: npm ci

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc
          npm publish --registry https://registry.npmjs.org/ --access public
