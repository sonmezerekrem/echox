# Publish to GitHub Packages when compilation-related files change on main.
# Uses the version from package.json — bump it before pushing when you want a new release.
# Install globally: npm install -g @sonmezerekrem/echox
# (Add a .npmrc or use: npm install -g @sonmezerekrem/echox --registry=https://npm.pkg.github.com)

name: Publish to GitHub Packages

on:
  push:
    branches: [main]
    paths:
      - "bin/**"
      - "src/**"
      - "astro.config.mjs"
      - "package.json"
      - "package-lock.json"
      - ".npmrc"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@sonmezerekrem"

      - name: Install dependencies
        run: npm ci

      - name: Publish package
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
