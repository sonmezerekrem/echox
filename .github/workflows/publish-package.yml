# Publish to GitHub Packages and/or npmjs.com.
# - Auto: runs on push to main when package files change (publishes to both).
# - Manual: Actions → Publish package → Run workflow → choose branch and destination.
#
# Add NPM_TOKEN in repo Secrets for npm: https://www.npmjs.com/settings/~yourusername/tokens

name: Publish package

on:
  push:
    branches: [main]
    paths:
      - "bin/**"
      - "src/**"
      - "astro.config.mjs"
      - "package.json"
      - "package-lock.json"
      - ".npmrc"
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to publish from'
        required: true
        default: 'main'
        type: string
      destination:
        description: 'Where to publish'
        required: true
        default: 'both'
        type: choice
        options:
          - github
          - npm
          - both

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@sonmezerekrem"

      - name: Install dependencies
        run: npm ci

      - name: Publish to GitHub Packages
        if: github.event_name != 'workflow_dispatch' || inputs.destination == 'github' || inputs.destination == 'both'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        if: github.event_name != 'workflow_dispatch' || inputs.destination == 'npm' || inputs.destination == 'both'
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc
          npm publish --registry https://registry.npmjs.org/ --access public
